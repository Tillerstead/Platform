<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login - Tillerstead</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      .login-container {
        background: white;
        border-radius: 12px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        width: 100%;
        max-width: 420px;
        padding: 40px;
      }

      .logo {
        text-align: center;
        margin-bottom: 30px;
      }

      .logo h1 {
        font-size: 28px;
        color: #333;
        margin-bottom: 8px;
      }

      .logo p {
        color: #666;
        font-size: 14px;
      }

      .form-group {
        margin-bottom: 20px;
      }

      label {
        display: block;
        margin-bottom: 8px;
        color: #333;
        font-weight: 500;
        font-size: 14px;
      }

      input {
        width: 100%;
        padding: 12px 16px;
        border: 2px solid #e0e0e0;
        border-radius: 8px;
        font-size: 15px;
        transition: border-color 0.3s;
      }

      input:focus {
        outline: none;
        border-color: #667eea;
      }

      .btn {
        width: 100%;
        padding: 14px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition:
          transform 0.2s,
          box-shadow 0.2s;
      }

      .btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
      }

      .btn:active {
        transform: translateY(0);
      }

      .btn:disabled {
        background: #ccc;
        cursor: not-allowed;
        transform: none;
      }

      .error {
        background: #fee;
        border: 1px solid #fcc;
        color: #c33;
        padding: 12px;
        border-radius: 8px;
        margin-bottom: 20px;
        font-size: 14px;
        display: none;
      }

      .error.show {
        display: block;
      }

      /* Login method tabs */
      .login-tabs {
        display: flex;
        border-bottom: 2px solid #e0e0e0;
        margin-bottom: 24px;
      }

      .login-tab {
        flex: 1;
        background: none;
        border: none;
        padding: 10px 8px;
        font-size: 14px;
        font-weight: 600;
        color: #999;
        cursor: pointer;
        border-bottom: 2px solid transparent;
        margin-bottom: -2px;
        transition:
          color 0.2s,
          border-color 0.2s;
      }

      .login-tab:hover {
        color: #555;
      }

      .login-tab--active {
        color: #333;
        border-bottom-color: #667eea;
      }

      .gh-hint {
        font-size: 13px;
        color: #666;
        margin-bottom: 16px;
        line-height: 1.5;
      }

      .gh-hint strong {
        color: #333;
      }

      .gh-input-mono {
        font-family: ui-monospace, 'Cascadia Code', 'Fira Code', monospace;
        font-size: 13px;
        letter-spacing: -0.02em;
      }

      .scope-info {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 12px;
        color: #888;
        margin-bottom: 16px;
      }

      .scope-badge {
        background: rgba(102, 126, 234, 0.1);
        color: #667eea;
        font-family: ui-monospace, monospace;
        font-size: 11px;
        padding: 2px 6px;
        border-radius: 4px;
      }

      .footer {
        margin-top: 30px;
        text-align: center;
        color: #888;
        font-size: 13px;
      }

      .loading {
        display: inline-block;
        width: 16px;
        height: 16px;
        border: 3px solid rgba(255, 255, 255, 0.3);
        border-radius: 50%;
        border-top-color: white;
        animation: spin 0.8s linear infinite;
        margin-right: 8px;
        vertical-align: middle;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="login-container">
      <div class="logo">
        <h1>🔧 Tillerstead</h1>
        <p>Admin Panel</p>
      </div>

      <div id="error" class="error"></div>

      <div class="login-tabs" role="tablist">
        <button
          class="login-tab login-tab--active"
          role="tab"
          aria-selected="true"
          aria-controls="panel-creds"
          id="tab-creds"
          type="button"
        >
          Username &amp; Password
        </button>
        <button
          class="login-tab"
          role="tab"
          aria-selected="false"
          aria-controls="panel-github"
          id="tab-github"
          type="button"
        >
          GitHub Token
        </button>
      </div>

      <div id="panel-creds" role="tabpanel" aria-labelledby="tab-creds">
        <form id="loginForm">
          <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required autocomplete="username" autofocus />
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required autocomplete="current-password" />
          </div>

          <button type="submit" class="btn" id="loginBtn">Sign In</button>
        </form>
      </div>

      <div id="panel-github" role="tabpanel" aria-labelledby="tab-github" hidden>
        <form id="ghLoginForm">
          <p class="gh-hint">
            Sign in from anywhere using a GitHub Personal Access Token with push access to
            <strong>xTx396/Tillerstead</strong>.
          </p>
          <div class="form-group">
            <label for="ghToken">Personal Access Token</label>
            <input
              type="password"
              id="ghToken"
              name="ghToken"
              class="gh-input-mono"
              placeholder="ghp_xxxxxxxxxxxxxxxxxxxx"
              autocomplete="off"
              required
            />
          </div>
          <div class="scope-info">
            <span>Required scope:</span>
            <span class="scope-badge">repo</span>
            <span>or</span>
            <span class="scope-badge">public_repo</span>
          </div>
          <button type="submit" class="btn" id="ghLoginBtn">Sign in with GitHub</button>
        </form>
      </div>

      <div class="footer">
        <p>&copy; 2026 Tillerstead. All rights reserved.</p>
      </div>
    </div>

    <script>
      const form = document.getElementById('loginForm');
      const errorDiv = document.getElementById('error');
      const loginBtn = document.getElementById('loginBtn');

      // Tab switching
      document.querySelectorAll('.login-tab').forEach(tab => {
        tab.addEventListener('click', () => {
          document.querySelectorAll('.login-tab').forEach(t => {
            t.classList.remove('login-tab--active');
            t.setAttribute('aria-selected', 'false');
          });
          tab.classList.add('login-tab--active');
          tab.setAttribute('aria-selected', 'true');

          const panelId = tab.getAttribute('aria-controls');
          document.querySelectorAll('[role="tabpanel"]').forEach(p => (p.hidden = true));
          document.getElementById(panelId).hidden = false;

          errorDiv.classList.remove('show');
          errorDiv.textContent = '';
        });
      });

      // Username/password login
      form.addEventListener('submit', async e => {
        e.preventDefault();

        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;

        loginBtn.disabled = true;
        loginBtn.innerHTML = '<span class="loading"></span>Signing in...';
        errorDiv.classList.remove('show');

        try {
          const response = await fetch('/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password }),
          });

          const data = await response.json();

          if (response.ok) {
            window.location.href = '/';
          } else {
            errorDiv.textContent = data.error || 'Login failed';
            errorDiv.classList.add('show');
            loginBtn.disabled = false;
            loginBtn.innerHTML = 'Sign In';
          }
        } catch (error) {
          errorDiv.textContent = 'Connection error. Please try again.';
          errorDiv.classList.add('show');
          loginBtn.disabled = false;
          loginBtn.innerHTML = 'Sign In';
        }
      });

      // GitHub PAT login
      const ghForm = document.getElementById('ghLoginForm');
      const ghBtn = document.getElementById('ghLoginBtn');

      ghForm.addEventListener('submit', async e => {
        e.preventDefault();

        const token = document.getElementById('ghToken').value.trim();
        if (!token) return;

        ghBtn.disabled = true;
        ghBtn.innerHTML = '<span class="loading"></span>Verifying...';
        errorDiv.classList.remove('show');

        try {
          const response = await fetch('/api/auth/github-token', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ token }),
          });

          const data = await response.json();

          if (response.ok) {
            window.location.href = '/';
          } else {
            errorDiv.textContent = data.error || 'Authentication failed';
            errorDiv.classList.add('show');
            ghBtn.disabled = false;
            ghBtn.innerHTML = 'Sign in with GitHub';
          }
        } catch (error) {
          errorDiv.textContent = 'Connection error. Please try again.';
          errorDiv.classList.add('show');
          ghBtn.disabled = false;
          ghBtn.innerHTML = 'Sign in with GitHub';
        }
      });
    </script>
  </body>
</html>
